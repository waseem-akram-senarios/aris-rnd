services:
  # Ingestion Service - Handles document processing and indexing
  ingestion:
    image: aris-microservice:latest
    container_name: aris-ingestion
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=ingestion
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - VECTOR_STORE_TYPE=${VECTOR_STORE_TYPE:-opensearch}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - AWS_OPENSEARCH_DOMAIN=${AWS_OPENSEARCH_DOMAIN:-}
      - AWS_OPENSEARCH_INDEX=${AWS_OPENSEARCH_INDEX:-}
      - AWS_OPENSEARCH_ACCESS_KEY_ID=${AWS_OPENSEARCH_ACCESS_KEY_ID:-}
      - AWS_OPENSEARCH_SECRET_ACCESS_KEY=${AWS_OPENSEARCH_SECRET_ACCESS_KEY:-}
      - AWS_OPENSEARCH_REGION=${AWS_OPENSEARCH_REGION:-us-east-2}
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health | grep -q 'healthy' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Retrieval Service - Handles queries and vector store interactions
  retrieval:
    image: aris-microservice:latest
    container_name: aris-retrieval
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=retrieval
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - VECTOR_STORE_TYPE=${VECTOR_STORE_TYPE:-opensearch}
      - AWS_OPENSEARCH_DOMAIN=${AWS_OPENSEARCH_DOMAIN:-}
      - AWS_OPENSEARCH_INDEX=${AWS_OPENSEARCH_INDEX:-}
      - AWS_OPENSEARCH_ACCESS_KEY_ID=${AWS_OPENSEARCH_ACCESS_KEY_ID:-}
      - AWS_OPENSEARCH_SECRET_ACCESS_KEY=${AWS_OPENSEARCH_SECRET_ACCESS_KEY:-}
      - AWS_OPENSEARCH_REGION=${AWS_OPENSEARCH_REGION:-us-east-2}
    ports:
      - "8002:8002"
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./storage:/app/storage
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health | grep -q 'healthy' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Gateway Service - API Gateway and Orchestrator
  gateway:
    image: aris-microservice:latest
    container_name: aris-gateway
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=gateway
      - INGESTION_SERVICE_URL=http://ingestion:8001
      - RETRIEVAL_SERVICE_URL=http://retrieval:8002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
    depends_on:
      ingestion:
        condition: service_healthy
      retrieval:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q 'healthy' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit UI - Main Interface
  ui:
    image: aris-microservice:latest
    container_name: aris-ui
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=ui
      - INGESTION_SERVICE_URL=http://ingestion:8001
      - RETRIEVAL_SERVICE_URL=http://retrieval:8002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - VECTOR_STORE_TYPE=${VECTOR_STORE_TYPE:-opensearch}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_OPENSEARCH_DOMAIN=${AWS_OPENSEARCH_DOMAIN:-}
      - AWS_OPENSEARCH_INDEX=${AWS_OPENSEARCH_INDEX:-}
      - AWS_OPENSEARCH_ACCESS_KEY_ID=${AWS_OPENSEARCH_ACCESS_KEY_ID:-}
      - AWS_OPENSEARCH_SECRET_ACCESS_KEY=${AWS_OPENSEARCH_SECRET_ACCESS_KEY:-}
      - AWS_OPENSEARCH_REGION=${AWS_OPENSEARCH_REGION:-us-east-2}
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./vectorstore:/app/vectorstore
      - ./logs:/app/logs
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/_stcore/health | grep -q 'ok' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: aris-network
