version: '3.8'

# Direct Streamlit on Port 80 Configuration
# This runs Streamlit directly on port 80 without nginx
# Simpler setup, but no reverse proxy features

services:
  # Streamlit Application (Direct on Port 80)
  aris-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aris-rag-app
    # Expose Streamlit directly on port 80
    ports:
      - "80:8501"  # Map host port 80 to container port 8501
    environment:
      # OpenAI API (required)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Cerebras API (optional)
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      # AWS Credentials (optional, for Textract)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # OpenSearch Credentials (optional)
      - AWS_OPENSEARCH_ACCESS_KEY_ID=${AWS_OPENSEARCH_ACCESS_KEY_ID:-}
      - AWS_OPENSEARCH_SECRET_ACCESS_KEY=${AWS_OPENSEARCH_SECRET_ACCESS_KEY:-}
      - AWS_OPENSEARCH_REGION=${AWS_OPENSEARCH_REGION:-us-east-2}
    volumes:
      # Persist vectorstore data
      - ./vectorstore:/app/vectorstore
      # Mount data directory for documents
      - ./data:/app/data
      # Mount .env file if it exists (read-only)
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '7'  # Use 7 of 8 CPUs (leave 1 for system)
          memory: 12G  # Use 12GB of 14GB (leave 2GB for system)
        reservations:
          cpus: '4'  # Reserve 4 CPUs for guaranteed performance
          memory: 8G  # Reserve 8GB for guaranteed availability

# Note: No nginx service - Streamlit is accessed directly on port 80
# Access at: http://your-server-ip (no port number needed!)
#
# Pros:
# - Simpler setup (one less container)
# - Direct access on port 80 (clean URL)
# - Less resource usage
# - Faster startup
#
# Cons:
# - No SSL/HTTPS (unless configured in Streamlit)
# - No nginx security headers
# - No rate limiting
# - Streamlit is a development server (not production-optimized)



