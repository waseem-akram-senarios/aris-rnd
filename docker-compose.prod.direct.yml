version: '3.8'

# Direct Streamlit Access Configuration
# This bypasses nginx and exposes Streamlit directly on port 8501
# Use this for testing/development or when nginx is not needed

services:
  # Streamlit Application (Direct Access)
  aris-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aris-rag-app
    # Expose Streamlit directly on port 8501
    ports:
      - "8501:8501"
    environment:
      # OpenAI API (required)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Cerebras API (optional)
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      # AWS Credentials (optional, for Textract)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # OpenSearch Credentials (optional)
      - AWS_OPENSEARCH_ACCESS_KEY_ID=${AWS_OPENSEARCH_ACCESS_KEY_ID:-}
      - AWS_OPENSEARCH_SECRET_ACCESS_KEY=${AWS_OPENSEARCH_SECRET_ACCESS_KEY:-}
      - AWS_OPENSEARCH_REGION=${AWS_OPENSEARCH_REGION:-us-east-2}
    volumes:
      # Persist vectorstore data
      - ./vectorstore:/app/vectorstore
      # Mount data directory for documents
      - ./data:/app/data
      # Mount .env file if it exists (read-only)
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

# Note: No nginx service - Streamlit is accessed directly
# Access at: http://your-server-ip:8501

